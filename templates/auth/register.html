{% extends "base.html" %}
{% block title %}Register — Keeper League{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='favicon.svg') }}" alt="KL">
      <div>
        <div class="auth-logo-text">Keeper League</div>
        <div class="auth-logo-sub">Fantasy AFL</div>
      </div>
    </div>
    <h3 class="fw-bold mb-1">Create your account</h3>
    <p class="text-secondary mb-4" style="font-size:.9rem;">Join a league or create your own</p>
    <form method="POST" class="text-start">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Choose a username" minlength="3" maxlength="80" value="{{ form.get('username', '') }}">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com" value="{{ form.get('email', '') }}">
      </div>
      <div class="mb-3">
        <label for="display_name" class="form-label">Display Name <span class="text-secondary" style="font-size:.75rem;">(optional)</span></label>
        <input type="text" class="form-control" id="display_name" name="display_name" placeholder="What others see" maxlength="80" value="{{ form.get('display_name', '') }}">
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required placeholder="Min 6 characters" minlength="6">
        </div>
        <div class="col-6">
          <label for="confirm_password" class="form-label">Confirm</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Re-enter" minlength="6">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>
    <p class="text-center mt-4 mb-0" style="font-size:.85rem;color:#8b949e;">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#58a6ff;text-decoration:none;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
