{# Sub-navigation bar for the "Players" section #}
<div class="league-subnav">
  <a class="league-subtab{% if active_subtab|default('') == 'pool' %} active{% endif %}"
     href="{{ url_for('leagues.player_pool', league_id=league.id) }}">
    <i class="bi bi-person-plus"></i>Pool
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'compare' %} active{% endif %}"
     href="{{ url_for('leagues.player_compare', league_id=league.id) }}">
    <i class="bi bi-people"></i>Compare
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'stats' %} active{% endif %}"
     href="{{ url_for('leagues.advanced_stats', league_id=league.id) }}">
    <i class="bi bi-graph-up"></i>Stats
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'lineups' %} active{% endif %}"
     href="{{ url_for('matchups.team_lineups', league_id=league.id) }}">
    <i class="bi bi-person-check"></i>Lineups
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'injuries' %} active{% endif %}"
     href="{{ url_for('leagues.player_injuries', league_id=league.id) }}">
    <i class="bi bi-bandaid"></i>Injuries
  </a>
</div>
