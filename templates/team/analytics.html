{% extends "league_base.html" %}
{% set active_tab = 'team' %}
{% block league_content %}
<style>
  :root { --g:#3fb950; --r:#ef4444; --b:#58a6ff; --p:#d2a8ff; --o:#fb923c; --cy:#06b6d4; --gd:#fbbf24; --gr:#8b949e; }
  .wr-loading { text-align:center; padding:80px 20px; color:#484f58; }
  .wr-loading .spinner { width:36px; height:36px; border:3px solid #21262d; border-top-color:var(--b); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; margin-bottom:16px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Story flow */
  .story { max-width:900px; margin:0 auto; }
  .chapter { margin-bottom:32px; animation:fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .ch-label { font-size:.6rem; font-weight:800; color:#484f58; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
  .ch-title { font-size:1.15rem; font-weight:800; color:#e6edf3; line-height:1.4; margin-bottom:6px; }
  .ch-body { font-size:.88rem; color:#c9d1d9; line-height:1.7; }
  .ch-card { background:#161b22; border:1px solid #21262d; border-radius:12px; overflow:hidden; }
  .ch-card-body { padding:18px 20px; }

  /* Timeline */
  .tl-track { position:relative; padding:20px 0 20px 32px; }
  .tl-line { position:absolute; left:12px; top:0; bottom:0; width:2px; background:linear-gradient(180deg,var(--g),var(--b),var(--p)); }
  .tl-node { position:relative; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; }
  .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; position:relative; left:-26px; }
  .tl-dot-green { background:var(--g); box-shadow:0 0 8px rgba(63,185,80,.4); }
  .tl-dot-blue { background:var(--b); box-shadow:0 0 8px rgba(88,166,255,.4); }
  .tl-dot-red { background:var(--r); box-shadow:0 0 8px rgba(239,68,68,.4); }
  .tl-content { flex:1; margin-left:-14px; }
  .tl-year { font-size:.68rem; font-weight:800; color:var(--gr); }
  .tl-event { font-size:.82rem; color:#e6edf3; font-weight:600; }
  .tl-detail { font-size:.72rem; color:#6e7681; }

  /* Gap visual */
  .gap-visual { display:flex; align-items:center; gap:16px; padding:16px; background:#0d1117; border-radius:10px; margin-top:10px; }
  .gap-bar-wrap { flex:1; }
  .gap-bar { height:10px; border-radius:5px; background:#21262d; position:relative; overflow:visible; }
  .gap-fill { height:100%; border-radius:5px; }
  .gap-marker { position:absolute; top:-6px; width:2px; height:22px; background:var(--gd); border-radius:1px; }
  .gap-labels { display:flex; justify-content:space-between; font-size:.62rem; color:#6e7681; margin-top:4px; }

  /* Depth cards */
  .depth-row { margin-bottom:14px; }
  .depth-cards { display:flex; gap:6px; flex-wrap:wrap; }
  .pc { padding:10px 12px; background:#0d1117; border:1px solid #21262d; border-radius:8px; min-width:115px; cursor:pointer; transition:all .2s; }
  .pc:hover { border-color:#484f58; transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.4); }
  .pc-name { font-size:.74rem; font-weight:700; color:#e6edf3; }
  .pc-sc { font-size:1rem; font-weight:800; margin-top:2px; }
  .pc-meta { font-size:.58rem; color:#6e7681; margin-top:3px; }
  .pc-rising { border-left:3px solid var(--g); }
  .pc-declining { border-left:3px solid var(--r); }
  .pc-stable { border-left:3px solid #30363d; }

  /* Filters */
  .filters { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .fbtn { padding:4px 12px; border-radius:8px; border:1px solid #30363d; background:transparent; color:var(--gr); font-size:.7rem; font-weight:600; cursor:pointer; transition:all .12s; }
  .fbtn:hover { border-color:#484f58; color:#c9d1d9; }
  .fbtn.active { border-color:var(--b); color:var(--b); background:rgba(88,166,255,.08); }

  /* Detail panel */
  .detail { display:none; background:#0d1117; border:1px solid #30363d; border-radius:12px; padding:18px; margin-bottom:16px; animation:fadeIn .2s ease; }
  .detail.open { display:block; }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:6px; }
  .detail-stat { text-align:center; padding:8px; background:#161b22; border-radius:8px; }
  .detail-val { font-size:1.05rem; font-weight:800; color:#e6edf3; }
  .detail-lbl { font-size:.55rem; color:#6e7681; text-transform:uppercase; margin-top:2px; }

  /* Trade */
  .trade-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .trade-panel { background:#0d1117; border-radius:10px; padding:14px 16px; }
  .trade-title { font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .trade-row { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid #161b22; font-size:.74rem; cursor:pointer; transition:background .1s; }
  .trade-row:hover { background:rgba(88,166,255,.04); }
  .trade-row:last-child { border-bottom:none; }

  @media(max-width:768px) {
    .trade-grid { grid-template-columns:1fr; }
    .depth-cards { overflow-x:auto; flex-wrap:nowrap; }
    .pc { min-width:130px; flex-shrink:0; }
  }
</style>

<div id="app">
  <div class="wr-loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:.85rem;">Building your story...</p>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
var API = "{{ url_for('team.team_analytics_api', league_id=league.id, team_id=team.id) }}";
var TID = {{ team.id }};
var TNAME = {{ team.name|tojson }};
var PD_BASE = "{{ url_for('player_detail', name='__NAME__') }}".replace('__NAME__','');
var tagColors = {'Elite':'#ffd700','Elite Veteran':'#c084fc','Premium':'#fb923c','Emerging Star':'#10b981','Breakout':'#06b6d4','Proven':'#3b82f6','Steady':'#94a3b8','Developing':'#4ade80','Project':'#eab308','Declining':'#ef4444','Veteran':'#a8a29e','Fringe':'#71717a'};
var roleLabels = {'small_fwd':'Small Fwd','mid_fwd':'Med Fwd','key_fwd':'Key Fwd','small_mid':'Small Mid','tall_mid':'Tall Mid','small_def':'Small Def','key_def':'Key Def','ruck':'Ruck'};
var D = null;

fetch(API).then(r=>r.json()).then(d=>{D=d;document.getElementById('loading').style.display='none';render()}).catch(()=>{document.getElementById('loading').innerHTML='<p style="color:#ef4444;">Failed to load. Try refreshing.</p>';});

function render() {
  var app = document.getElementById('app');
  var a = D.analytics||{};
  var n = D.narrative||{};
  var h = '';

  // ═══ CHAPTER 1: THE VERDICT ═══
  h += '<div class="story">';
  h += '<div class="chapter">';
  h += '<div class="ch-label">The Verdict</div>';
  h += '<div class="ch-title">' + TNAME + '</div>';
  h += '<div class="ch-body">' + (n.verdict||'Analytics loading...') + '</div>';
  h += '</div>';

  // ═══ CHAPTER 2: YOUR DYNASTY ═══
  if (D.dynasty && Object.keys(D.dynasty).length) {
    h += '<div class="chapter">';
    h += '<div class="ch-label">Your Dynasty</div>';
    h += '<div class="ch-title">5-Year Competitive Outlook</div>';
    h += '<div class="ch-card"><div class="ch-card-body" style="padding:8px 12px;">';
    h += '<div id="dynastyChart" style="width:100%;height:300px;"></div>';
    h += '<div style="font-size:.6rem;color:#6e7681;text-align:center;margin-top:4px;">Best 23 (6-9-1-6) auto-selected each year. Kids develop and displace veterans.</div>';
    h += '</div></div>';
    h += '</div>';
  }

  // ═══ CHAPTER 3: THE NEXT GENERATION ═══
  var kids = (n.kid_timeline||[]).filter(k=>k.replaces);
  if (kids.length) {
    h += '<div class="chapter">';
    h += '<div class="ch-label">The Next Generation</div>';
    h += '<div class="ch-title">When your kids take over</div>';
    h += '<div class="ch-body" style="margin-bottom:12px;">Your youth pipeline is your biggest asset. Here\'s when each young player is projected to break into the best 23 — and who they replace.</div>';
    h += '<div class="ch-card"><div class="ch-card-body" style="padding:12px 16px;">';
    h += '<div class="tl-track"><div class="tl-line"></div>';
    kids.forEach(function(k){
      h += '<div class="tl-node"><div class="tl-dot tl-dot-green"></div><div class="tl-content">';
      h += '<div class="tl-year">' + k.year + '</div>';
      h += '<div class="tl-event">' + k.enters + ' enters the lineup</div>';
      h += '<div class="tl-detail">Replaces ' + k.replaces + ' &middot; Projected SC: ' + Math.round(k.enters_sc) + ' &middot; Age ' + k.enters_age + '</div>';
      h += '</div></div>';
    });
    h += '</div></div></div>';
    h += '</div>';
  }

  // ═══ CHAPTER 4: YOUR WEAKNESS ═══
  var gap = n.biggest_gap;
  if (gap) {
    h += '<div class="chapter">';
    h += '<div class="ch-label">The Gap</div>';
    h += '<div class="ch-title">Your ' + gap.position + ' line is ' + Math.abs(gap.gap).toFixed(0) + ' points below league average</div>';
    h += '<div class="ch-body">Your ' + gap.position + ' group averages ' + gap.your_avg + ' per player vs the league average of ' + gap.league_avg + '. ' + gap.weakest + ' (' + Math.round(gap.weakest_sc) + ') is the weakest link.';
    if (gap.best_fill_name) h += ' <b style="color:#3fb950;">' + gap.best_fill_name + ' (' + Math.round(gap.best_fill_sc) + ')</b> is available as a free agent.';
    h += '</div>';
    h += '<div class="gap-visual"><span style="font-size:.72rem;font-weight:700;color:#e6edf3;">' + gap.position + '</span>';
    h += '<div class="gap-bar-wrap"><div class="gap-bar"><div class="gap-fill" style="width:' + Math.round(gap.your_avg/130*100) + '%;background:' + (gap.gap > -5 ? '#3fb950' : '#ef4444') + ';"></div>';
    h += '<div class="gap-marker" style="left:' + Math.round(gap.league_avg/130*100) + '%;"></div></div>';
    h += '<div class="gap-labels"><span>Your avg: ' + gap.your_avg + '</span><span style="color:#fbbf24;">League: ' + gap.league_avg + '</span></div>';
    h += '</div></div>';
    h += '</div>';
  }

  // ═══ CHAPTER 5: SQUAD DEPTH ═══
  var sd = D.squad_depth||{};
  if (Object.keys(sd).length) {
    h += '<div class="chapter">';
    h += '<div class="ch-label">Your Roster</div>';
    h += '<div class="ch-title">Squad Depth</div>';
    h += '<div class="filters" id="depthFilters">';
    h += '<button class="fbtn active" onclick="filterD(\'all\',this)">All</button>';
    ['DEF','MID','RUC','FWD'].forEach(function(p){h+='<button class="fbtn" onclick="filterD(\''+p+'\',this)">'+p+'</button>';});
    h += '</div>';
    h += '<div class="ch-card"><div class="ch-card-body" id="depthBoard"></div></div>';
    h += '<div class="detail" id="playerPanel"></div>';
    h += '</div>';
  }

  // ═══ CHAPTER 6: THE TRADE TABLE ═══
  var tt = D.trade_table||{};
  if (tt.free_agents || tt.trade_targets) {
    h += '<div class="chapter">';
    h += '<div class="ch-label">The Market</div>';
    h += '<div class="ch-title">Available Upgrades</div>';
    h += '<div class="ch-card"><div class="ch-card-body">';
    h += '<div class="trade-grid">';
    h += '<div class="trade-panel"><div class="trade-title" style="color:#3fb950;">Free Agents</div>';
    (tt.free_agents||[]).slice(0,8).forEach(function(fa){
      h += '<div class="trade-row" onclick="window.location=\''+PD_BASE+encodeURIComponent(fa.name)+'\'">';
      h += '<span class="pos-badge pos-'+fa.position+'" style="font-size:.5rem;padding:1px 4px;">'+fa.position+'</span>';
      h += '<span style="flex:1;color:#e6edf3;font-weight:600;">'+fa.name+' <span style="color:#6e7681;font-size:.6rem;">'+fa.age+'y</span></span>';
      if (fa.fills_gap) h += '<span style="font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(63,185,80,.12);color:#3fb950;">fills gap</span>';
      h += '<span style="font-weight:700;color:#3fb950;min-width:30px;text-align:right;">'+Math.round(fa.sc_avg)+'</span></div>';
    });
    h += '</div>';
    h += '<div class="trade-panel"><div class="trade-title" style="color:#58a6ff;">Surplus on Other Teams</div>';
    (tt.trade_targets||[]).slice(0,8).forEach(function(bt){
      h += '<div class="trade-row"><span class="pos-badge pos-'+bt.position+'" style="font-size:.5rem;padding:1px 4px;">'+bt.position+'</span>';
      h += '<span style="flex:1;color:#e6edf3;font-weight:600;">'+bt.name+' <span style="color:#6e7681;font-size:.6rem;">'+bt.owner+'</span></span>';
      if (bt.fills_gap) h += '<span style="font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(63,185,80,.12);color:#3fb950;">fills gap</span>';
      h += '<span style="font-weight:700;color:#58a6ff;min-width:30px;text-align:right;">'+Math.round(bt.sc_avg)+'</span></div>';
    });
    h += '</div></div>';
    // Surplus
    if (tt.surplus && tt.surplus.length) {
      h += '<div style="margin-top:14px;"><div style="font-size:.66rem;font-weight:800;color:#fb923c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Your Tradeable Assets</div>';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;">';
      tt.surplus.slice(0,8).forEach(function(s){
        h += '<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 12px;font-size:.74rem;display:flex;gap:6px;align-items:center;cursor:pointer;" onclick="window.location=\''+PD_BASE+encodeURIComponent(s.name)+'\'">';
        h += '<span style="color:#e6edf3;font-weight:600;">'+s.name+'</span>';
        h += '<span style="color:#fb923c;font-weight:700;">'+Math.round(s.sc_avg)+'</span></div>';
      });
      h += '</div></div>';
    }
    h += '</div></div></div>';
  }

  // ═══ CHAPTER 7: SCOUTING REPORT ═══
  var secs = D.ai_sections||[];
  if (secs.length > 1) {
    var scColors = ['#58a6ff','#ef4444','#d2a8ff','#fb923c'];
    h += '<div class="chapter">';
    h += '<div class="ch-label">Deep Dive</div>';
    h += '<div class="ch-title">AI Scouting Report</div>';
    for (var i=1;i<secs.length;i++) {
      var sc=scColors[(i-1)%scColors.length];
      h += '<div style="padding:14px 18px;background:#0d1117;border-radius:10px;margin-bottom:8px;border-left:3px solid '+sc+';">';
      if (secs[i].title) h += '<div style="font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:'+sc+';">'+secs[i].title+'</div>';
      h += '<div style="font-size:.84rem;color:#c9d1d9;line-height:1.65;">'+secs[i].body+'</div></div>';
    }
    h += '</div>';
  }

  h += '</div>'; // close story
  app.innerHTML = h;

  setTimeout(function(){
    renderDynasty();
    renderDepth('all');
  }, 50);
}

// ═══ DYNASTY CHART ═══
function renderDynasty() {
  var el = document.getElementById('dynastyChart');
  if (!el || !D.dynasty) return;
  var ch = echarts.init(el);
  var greys=['#4b5563','#6b7280','#9ca3af','#d1d5db','#374151'];var gi=0;
  var series=[], xl=null;
  Object.keys(D.dynasty).forEach(function(tid){
    var t=D.dynasty[tid]; var you=parseInt(tid)===TID;
    if(!xl) xl=t.years.map(y=>y.year);
    series.push({
      name:t.name,type:'line',data:t.years.map(y=>y.total),smooth:true,
      lineStyle:{width:you?4:1.5,color:you?'#58a6ff':greys[gi%greys.length]},
      itemStyle:{color:you?'#58a6ff':greys[gi%greys.length],borderColor:'#0d1117',borderWidth:you?2:1},
      symbol:you?'circle':'none',symbolSize:you?10:0,
      areaStyle:you?{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(88,166,255,.15)'},{offset:1,color:'rgba(88,166,255,.01)'}]}}:null,
      z:you?10:1,
      label:you?{show:true,position:'top',color:'#e6edf3',fontSize:12,fontWeight:700,formatter:p=>p.value.toLocaleString()}:{show:false},
      emphasis:{lineStyle:{width:3},focus:'series'},
    });
    if(!you)gi++;
  });
  ch.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#0d1117',borderColor:'#30363d',textStyle:{color:'#c9d1d9',fontSize:11},
      formatter:function(ps){ps.sort((a,b)=>b.value-a.value);var h='<b>'+ps[0].axisValue+'</b><br>';ps.forEach(p=>{var y=p.seriesName===D.dynasty[TID].name;h+='<span style="color:'+p.color+';">●</span> '+(y?'<b>':'')+p.seriesName+': '+p.value.toLocaleString()+(y?'</b>':'')+'<br>';});return h;}},
    legend:{show:true,bottom:0,textStyle:{color:'#8b949e',fontSize:10},itemWidth:14,itemHeight:2},
    grid:{top:25,right:20,bottom:45,left:55},
    dataZoom:[{type:'inside'},{type:'slider',height:16,bottom:22,borderColor:'#21262d',fillerColor:'rgba(88,166,255,.1)',handleStyle:{color:'#58a6ff'},textStyle:{color:'#8b949e',fontSize:9}}],
    xAxis:{type:'category',data:xl,axisLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:11,fontWeight:600}},
    yAxis:{type:'value',min:v=>Math.floor(v.min*.92),axisLine:{show:false},splitLine:{lineStyle:{color:'#161b22'}},axisLabel:{color:'#6e7681',fontSize:10}},
    series:series,
  });
  window.addEventListener('resize',()=>ch.resize());
}

// ═══ DEPTH BOARD ═══
function renderDepth(posFilter) {
  var b=document.getElementById('depthBoard');if(!b||!D.squad_depth)return;
  var sd=D.squad_depth;var h='';
  ['DEF','MID','RUC','FWD'].forEach(pos=>{
    if(posFilter!=='all'&&posFilter!==pos)return;
    var pd=sd[pos]||{};
    var players=pd.players||[];
    var dc=(pd.diff||0)>3?'#3fb950':(pd.diff||0)<-3?'#ef4444':'#6e7681';
    h+='<div class="depth-row"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
    h+='<span><span class="pos-badge pos-'+pos+'" style="font-size:.65rem;padding:2px 6px;">'+pos+'</span> <span style="font-size:.72rem;color:#8b949e;">'+pd.count+' players · avg <b style="color:#e6edf3;">'+pd.avg_sc+'</b></span></span>';
    h+='<span style="font-size:.68rem;color:'+dc+';font-weight:600;">'+(pd.diff>0?'+':'')+Math.round(pd.diff||0)+' vs league</span></div>';
    h+='<div class="depth-cards">';
    players.slice(0,8).forEach(p=>{
      var bc='pc-'+p.trajectory;
      var sc_col=p.sc>=100?'#3fb950':p.sc>=80?'#e6edf3':'#8b949e';
      h+='<div class="pc '+bc+'" onclick="showDetail(\''+p.name.replace(/'/g,"\\'")+'\')">';
      h+='<div class="pc-name">'+p.name+'</div>';
      h+='<div class="pc-sc" style="color:'+sc_col+';">'+Math.round(p.sc)+'</div>';
      h+='<div class="pc-meta">'+p.age+'y · <span class="profile-tag tag-'+p.tag_css+'" style="font-size:.48rem;padding:0 4px;">'+p.tag+'</span></div></div>';
    });
    h+='</div></div>';
  });
  b.innerHTML=h;
}
function filterD(pos,btn) {
  document.querySelectorAll('#depthFilters .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDepth(pos);
}

// ═══ PLAYER DETAIL ═══
function showDetail(name) {
  var panel=document.getElementById('playerPanel');if(!panel)return;
  var p=null;(D.analytics.player_bayesian||[]).forEach(pl=>{if(pl.name===name)p=pl;});
  if(!p){panel.classList.remove('open');return;}
  var rl=roleLabels[p.role_bucket]||p.position||'';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  h+='<div><span style="font-size:1rem;font-weight:800;color:#e6edf3;">'+p.name+'</span> <span style="font-size:.75rem;color:#8b949e;">'+rl+' · '+p.age+'yo</span>';
  if(p.tag)h+=' <span class="profile-tag tag-'+(p.tag_css||'')+'">'+p.tag+'</span>';
  h+='</div><button onclick="document.getElementById(\'playerPanel\').classList.remove(\'open\')" style="background:none;border:none;color:#6e7681;cursor:pointer;font-size:1.1rem;"><i class="bi bi-x-lg"></i></button></div>';
  h+='<div class="detail-grid">';
  h+='<div class="detail-stat"><div class="detail-val">'+Math.round(p.raw_avg||0)+'</div><div class="detail-lbl">SC Avg</div></div>';
  h+='<div class="detail-stat"><div class="detail-val">'+Math.round(p.true_talent||0)+'</div><div class="detail-lbl">Estimated</div></div>';
  h+='<div class="detail-stat"><div class="detail-val" style="color:#3fb950;">'+Math.round(p.ceiling||0)+'</div><div class="detail-lbl">Ceiling</div></div>';
  h+='<div class="detail-stat"><div class="detail-val" style="color:#ef4444;">'+Math.round(p.floor||0)+'</div><div class="detail-lbl">Floor</div></div>';
  h+='<div class="detail-stat"><div class="detail-val">'+Math.round(p.games||0)+'</div><div class="detail-lbl">Games</div></div>';
  h+='</div>';
  if(p.round_scores&&p.round_scores.length>1){h+='<div id="sparkChart" style="height:80px;margin-top:10px;"></div>';}
  h+='<div style="margin-top:8px;text-align:right;"><a href="'+PD_BASE+encodeURIComponent(p.name)+'" style="font-size:.72rem;color:#58a6ff;text-decoration:none;">Full profile →</a></div>';
  panel.innerHTML=h;panel.classList.add('open');panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(p.round_scores&&p.round_scores.length>1){setTimeout(()=>{
    var se=document.getElementById('sparkChart');if(!se)return;
    var sp=echarts.init(se);
    sp.setOption({grid:{top:5,right:5,bottom:20,left:30},xAxis:{type:'category',data:p.round_scores.map((_,i)=>'R'+(i+1)),axisLabel:{color:'#6e7681',fontSize:9},axisLine:{lineStyle:{color:'#21262d'}}},yAxis:{type:'value',axisLabel:{color:'#6e7681',fontSize:9},splitLine:{lineStyle:{color:'#161b22'}},axisLine:{show:false}},series:[{type:'bar',data:p.round_scores,itemStyle:{color:params=>params.value>=100?'#3fb950':params.value>=70?'#58a6ff':'#6e7681',borderRadius:[3,3,0,0]},barWidth:'60%'}],tooltip:{trigger:'axis',backgroundColor:'#0d1117',borderColor:'#30363d',textStyle:{color:'#c9d1d9'}}});
  },100);}
}
</script>
{% endblock %}
