<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d1117;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="500" cellpadding="0" cellspacing="0" style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#238636,#1f6feb);padding:24px 30px;">
              <span style="font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:.5px;">KL</span>
              <span style="color:rgba(255,255,255,.8);font-size:.9rem;margin-left:8px;">Keeper League</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:30px;">
              <h2 style="color:#c9d1d9;font-size:1.1rem;margin:0 0 12px;">{{ title }}</h2>
              {% if body %}
                <p style="color:#8b949e;font-size:.9rem;line-height:1.5;margin:0 0 20px;">{{ body }}</p>
              {% endif %}
              {% if link %}
                <a href="{{ link }}" style="display:inline-block;background:#238636;color:#fff;text-decoration:none;padding:10px 24px;border-radius:6px;font-size:.85rem;font-weight:600;">
                  View Details
                </a>
              {% endif %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 30px;border-top:1px solid #30363d;">
              <p style="color:#6e7681;font-size:.75rem;margin:0;">
                You received this because you enabled email notifications.
                Update your preferences in your profile settings.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
