{# Sub-navigation bar for the "League" section #}
<div class="league-subnav">
  <a class="league-subtab{% if active_subtab|default('') == 'ladder' %} active{% endif %}"
     href="{{ url_for('matchups.standings', league_id=league.id) }}">
    <i class="bi bi-bar-chart"></i>Ladder
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'fixture' %} active{% endif %}"
     href="{{ url_for('matchups.fixture_view', league_id=league.id) }}">
    <i class="bi bi-calendar-week"></i>Season
  </a>
  {% if nav_finals_teams is defined and nav_finals_teams and nav_finals_teams > 0 %}
  <a class="league-subtab{% if active_subtab|default('') == 'finals' %} active{% endif %}"
     href="{{ url_for('matchups.finals_view', league_id=league.id) }}">
    <i class="bi bi-trophy"></i>Finals
  </a>
  {% endif %}
  <a class="league-subtab{% if active_subtab|default('') == 'history' %} active{% endif %}"
     href="{{ url_for('matchups.history_list', league_id=league.id) }}">
    <i class="bi bi-archive"></i>History
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'records' %} active{% endif %}"
     href="{{ url_for('leagues.league_history', league_id=league.id) }}">
    <i class="bi bi-trophy"></i>Records
  </a>
</div>
