{# Sub-navigation bar for the Reserve 7s "League" section #}
<div class="league-subnav d-none d-lg-flex">
  <a class="league-subtab{% if sevens_page|default('') == 'ladder' %} active{% endif %}"
     href="{{ url_for('reserve7s.sevens_standings', league_id=league.id) }}"
     {% if sevens_page|default('') == 'ladder' %}style="color:#bc8cff;"{% endif %}>
    <i class="bi bi-bar-chart"></i>Ladder
  </a>
  <a class="league-subtab{% if sevens_page|default('') == 'fixture' %} active{% endif %}"
     href="{{ url_for('reserve7s.sevens_fixture', league_id=league.id) }}"
     {% if sevens_page|default('') == 'fixture' %}style="color:#bc8cff;"{% endif %}>
    <i class="bi bi-calendar-week"></i>Season
  </a>
</div>
<div class="mob-subnav d-lg-none">
  <a class="mob-subnav-item{% if sevens_page|default('') == 'ladder' %} active{% endif %}"
     href="{{ url_for('reserve7s.sevens_standings', league_id=league.id) }}"
     {% if sevens_page|default('') == 'ladder' %}style="color:#bc8cff;border-bottom-color:#bc8cff;"{% endif %}>
    <i class="bi bi-bar-chart"></i>Ladder
  </a>
  <a class="mob-subnav-item{% if sevens_page|default('') == 'fixture' %} active{% endif %}"
     href="{{ url_for('reserve7s.sevens_fixture', league_id=league.id) }}"
     {% if sevens_page|default('') == 'fixture' %}style="color:#bc8cff;border-bottom-color:#bc8cff;"{% endif %}>
    <i class="bi bi-calendar-week"></i>Season
  </a>
</div>
