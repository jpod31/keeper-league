{# Sub-navigation bar for the "Comms" section #}
<div class="league-subnav">
  <a class="league-subtab{% if active_subtab|default('') == 'chat' %} active{% endif %}"
     href="{{ url_for('comms.league_chat', league_id=league.id) }}">
    <i class="bi bi-megaphone"></i>League Chat
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'messages' %} active{% endif %}"
     href="{{ url_for('comms.inbox', league_id=league.id) }}">
    <i class="bi bi-chat-dots"></i>Messages
  </a>
  <a class="league-subtab{% if active_subtab|default('') == 'activity' %} active{% endif %}"
     href="{{ url_for('comms.activity_feed', league_id=league.id) }}">
    <i class="bi bi-activity"></i>Activity
  </a>
</div>
